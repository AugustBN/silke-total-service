<div id="root"></div>
<script type="text/babel">

const Eyebrow = ({children}) => <div className="stb-eyebrow">{children}</div>;
const NavBar = () => (
  <header className="sth sth-solid">
    <div className="sth-inner">
      <a className="sth-logo" href="../index.html"><img src="../../../assets/logo-wordmark.svg" alt="Silke Total Service"/></a>
      <nav className="sth-nav">
        <a href="../index.html#ydelser">Ydelser</a>
        <a href="om-os.html">Om os</a>
        <a href="omraade.html">Område</a>
        <a href="kontakt.html">Kontakt</a>
      </nav>
      <div className="sth-right">
        <a className="sth-phone" href="https://www.facebook.com/profile.php?id=61574788933190" target="_blank" rel="noopener">facebook · silkehave</a>
        <a className="stb stb-primary" href="kontakt.html">Få et tilbud</a>
      </div>
    </div>
  </header>
);

const App = () => (
  <>
    <NavBar/>
    <article className="starticle">
      <div className="starticle-inner">
        <Eyebrow>Ydelse · Have</Eyebrow>
        <h1>Hækklipning, gjort ordentligt.</h1>
        <p className="lead">Vi klipper bøg, liguster, thuja og laurbær. Vi samler op efter os, og kører grenene væk — terrassen, indkørslen og græsplænen står som da vi kom.</p>
        <img className="hero-img" src="../../../assets/photos/haek-roekke-ny.png" alt="Frisk klippet bøgehæk"/>

        <h2>Hvad vi gør</h2>
        <ul className="check-list">
          <li>Klipper top, sider og bund i den højde du vil have.</li>
          <li>Lægger underlag ud, så græs og fliser ikke får grøn-pletter.</li>
          <li>Samler grenene op i sække eller på trailer — vi kører væk.</li>
          <li>Fejer og blæser pænt af, før vi tager hjem.</li>
        </ul>

        <h2>Pris</h2>
        <p>Du får en fast pris på den konkrete opgave inden vi starter. Den afhænger af længde, højde og hvor svær hækken er at komme til. Ring eller skriv, så regner vi på det.</p>

        <aside>
          <h4>Typiske spørgsmål</h4>
          <p><strong>Hvor ofte skal hækken klippes?</strong><br/>De fleste har en runde i juni og en i sensommer. Bøg står flot med én runde sidst i august.</p>
          <p style={{margin: 0}}><strong>Skal jeg være hjemme?</strong><br/>Det behøver du ikke. Vi aftaler højde og facon på forhånd, og sender et billede når vi er færdige.</p>
        </aside>

        <h2>Få en fast pris</h2>
        <p>Skriv kort hvor du bor og hvor lang hækken er. Vi vender tilbage indenfor 1–2 hverdage.</p>
        <a className="stb stb-primary" href="kontakt.html">Send en forespørgsel →</a>
      </div>

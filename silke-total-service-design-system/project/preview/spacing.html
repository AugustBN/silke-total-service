<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 16px 24px; background: var(--cream); font-family: var(--font-sans); font-size: 12px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
  .row .tok { font-family: var(--font-mono); font-size: 11px; color: var(--stone); width: 80px; }
  .row .px  { font-family: var(--font-mono); font-size: 11px; color: var(--bark); width: 50px; }
  .bar { height: 14px; background: var(--hedge); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><div class="tok">--space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="tok">--space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="tok">--space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="tok">--space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="tok">--space-6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="tok">--space-7</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="tok">--space-8</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="tok">--space-9</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  <div class="row"><div class="tok">--space-11</div><div class="bar" style="width:96px"></div><div class="px">96px</div></div>
</body></html>

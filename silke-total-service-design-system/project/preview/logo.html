<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 0; background: var(--cream); font-family: var(--font-sans); display: grid; grid-template-columns: 2fr 1fr; min-height: 100%; }
  .light, .dark { display: flex; align-items: center; justify-content: center; padding: 24px; }
  .light { background: var(--cream); }
  .dark  { background: var(--forest); }
  .light img { width: 280px; }
  .dark img  { width: 64px; }
</style>
</head>
<body>
  <div class="light"><img src="../assets/logo-wordmark.svg"></div>
  <div class="dark"><img src="../assets/logo-mark.svg"></div>
</body></html>

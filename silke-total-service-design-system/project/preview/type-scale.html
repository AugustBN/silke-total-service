<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 16px 24px; background: var(--cream); }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-sans); }
  td { padding: 6px 0; border-bottom: 1px solid var(--stone-25); vertical-align: baseline; }
  td.tok { font-family: var(--font-mono); font-size: 11px; color: var(--stone); width: 90px; }
  td.size { font-family: var(--font-mono); font-size: 11px; color: var(--stone); width: 60px; text-align: right; }
  td.specimen { font-family: var(--font-display); color: var(--forest); }
</style>
</head>
<body>
<table>
  <tr><td class="tok">--fs-h1</td><td class="specimen" style="font-size:48px; line-height:1">Silke</td><td class="size">48px</td></tr>
  <tr><td class="tok">--fs-h2</td><td class="specimen" style="font-size:36px; line-height:1">Silke</td><td class="size">36px</td></tr>
  <tr><td class="tok">--fs-h3</td><td class="specimen" style="font-size:26px; line-height:1">Silke</td><td class="size">26px</td></tr>
  <tr><td class="tok">--fs-h4</td><td class="specimen" style="font-size:20px; line-height:1">Silke</td><td class="size">20px</td></tr>
  <tr><td class="tok">--fs-body</td><td class="specimen" style="font-family: var(--font-sans); font-size:16px; line-height:1">Silke Total Service</td><td class="size">16px</td></tr>
</table>
</body></html>

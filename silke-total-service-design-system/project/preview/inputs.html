<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 24px; background: var(--cream); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--bark); margin-bottom: 6px; }
  .input, textarea { width: 100%; box-sizing: border-box; padding: 10px 14px; background: var(--bone); border: 1px solid var(--stone-25); border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: 14px; color: var(--bark); }
  .input:focus { outline: 2px solid var(--spring); outline-offset: 1px; border-color: var(--hedge); }
  .input.focused { outline: 2px solid var(--spring); outline-offset: 1px; border-color: var(--hedge); }
  .help { font-size: 12px; color: var(--stone); margin-top: 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <label>Navn</label>
      <input class="input" value="Mette Sørensen">
    </div>
    <div>
      <label>Telefon</label>
      <input class="input focused" value="30 12 34 56">
      <div class="help">Vi vender tilbage indenfor 1–2 hverdage.</div>
    </div>
    <div style="grid-column: span 2">
      <label>Hvad har du brug for?</label>
      <textarea rows="2" placeholder="Skriv kort hvad du har brug for — fx '100 m bøgehæk, klippes 2× om året'"></textarea>
    </div>
  </div>
</body></html>

<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Service icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 24px; background: var(--cream); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 8px; background: var(--bone); border: 1px solid var(--stone-25); border-radius: 8px; }
  .cell img { width: 28px; height: 28px; color: var(--forest); }
  .cell .label { font-size: 11px; color: var(--bark); font-weight: 500; text-align: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell" style="color: var(--forest)"><img src="../assets/icon-haveordning.svg"><div class="label">Haveordning</div></div>
    <div class="cell" style="color: var(--forest)"><img src="../assets/icon-haekklipning.svg"><div class="label">Hækklipning</div></div>
    <div class="cell" style="color: var(--forest)"><img src="../assets/icon-graesslaaning.svg"><div class="label">Græsslåning</div></div>
    <div class="cell" style="color: var(--forest)"><img src="../assets/icon-fliserens.svg"><div class="label">Fliserens</div></div>
    <div class="cell" style="color: var(--forest)"><img src="../assets/icon-vinduesrens.svg"><div class="label">Vinduesrens</div></div>
    <div class="cell" style="color: var(--forest)"><img src="../assets/icon-snerydning.svg"><div class="label">Snerydning</div></div>
  </div>
</body></html>
